name: circuit

on: [push]

jobs:
  test:
    name: nargo compile
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nargo
        uses: noir-lang/noirup@v0.1.3
        with:
          toolchain: 0.24.0

      - name: Run nargo compile
        run: nargo compile
